name: Build Linux

on:
  workflow_dispatch: # Allow manual trigger only

jobs:
  build:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Install Protobuf and OpenGL/X11 dependencies needed by Qt on Linux
        sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev libxcb-cursor0 libprotobuf-dev protobuf-compiler

    - name: Set up Python (for aqtinstall)
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install aqtinstall
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall

    - name: Install Qt
      run: |
        # Install Qt 6.10.3 for Linux using aqt
        aqt install-qt linux desktop 6.10.3 -m qtmultimedia
      shell: bash

    - name: Locate Qt Path
      id: qt-path
      run: |
        # aqt installs Linux desktop Qt into gcc_64
        QT_DIR="$PWD/6.10.3/gcc_64"
        echo "qt_dir=$QT_DIR" >> $GITHUB_OUTPUT
        echo "Qt installed at: $QT_DIR"

    - name: Configure CMake
      env:
        Qt6_DIR: ${{ steps.qt-path.outputs.qt_dir }}/lib/cmake/Qt6
      run: cmake -B ${{github.workspace}}/build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release --parallel 2

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: |
        # Install xvfb to run graphical tests headlessly
        sudo apt-get install -y xvfb
        xvfb-run ctest -C Release --output-on-failure

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FOHMedia-Linux-Binary
        path: ${{github.workspace}}/build/FOHMedia
        retention-days: 7
