name: Build macOS

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build and Package (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies (Protobuf)
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew untap aws/tap || true
          brew install protobuf

      - name: Set up Python (for aqtinstall)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install aqtinstall
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall

      - name: Install Qt
        run: |
          # Install Qt 6.10.3 with qtmultimedia module
          aqt install-qt mac desktop 6.10.3 -m qtmultimedia
        shell: bash

      - name: Locate Qt Path
        id: qt-path
        run: |
          # Find the directory where aqt installed Qt
          QT_DIR="$PWD/6.10.3/macos"
          echo "qt_dir=$QT_DIR" >> $GITHUB_OUTPUT
          echo "Qt installed at: $QT_DIR"

      - name: Configure CMake
        env:
          Qt6_DIR: ${{ steps.qt-path.outputs.qt_dir }}/lib/cmake/Qt6
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: |
          # Build in parallel, but limit to 2 jobs to prevent memory exhaustion (thrashing)
          cmake --build build --config Release --parallel 2

      - name: Run macdeployqt
        env:
          QT_DIR: ${{ steps.qt-path.outputs.qt_dir }}
        run: |
          # Find the built .app bundle
          APP_BUNDLE=$(find build -name "*.app" -maxdepth 3 | head -n 1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "Error: Could not find .app bundle"
            exit 1
          fi
          echo "Found app bundle: $APP_BUNDLE"
          
          # Run macdeployqt to bundle QML imports and Qt frameworks, and generate a DMG
          # Using 'qml' directory as specified in CMakeLists.txt
          # We use -codesign=- to ad-hoc sign the app so macOS ARM64 doesn't reject it as 'damaged'
          ${{ env.QT_DIR }}/bin/macdeployqt "$APP_BUNDLE" -qmldir=qml -always-overwrite -codesign=- -dmg

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FOHMedia-macOS-Binary
          path: build/*.dmg
          retention-days: 7
